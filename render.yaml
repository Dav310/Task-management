services:
  # Backend FastAPI
  - type: web
    name: task-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: task-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

  # Frontend React
  - type: static
    name: task-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://task-backend.onrender.com

databases:
  - name: task-db
    plan: free
